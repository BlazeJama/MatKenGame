<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MatKenGame</title>

  <!-- PWA meta -->
  <meta name="description" content="A quiz game that teaches you to recognise military vehicles from around the world." />
  <meta name="theme-color" content="#1a2744" />
  <link rel="manifest" href="manifest.json" />

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MatKenGame" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <!-- Fonts: Bebas Neue (display) · Rajdhani (UI) · Share Tech Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    /* ── Base ─────────────────────────────────────────── */
    html, body, #root { background-color: #070b14; min-height: 100%; }

    /* ── Scanlines (viewport-fixed, fully non-interactive) */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.016) 3px, rgba(0,0,0,0.016) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Amber grid pattern (applied per screen) ───────── */
    .tac-grid {
      background-color: #070b14;
      background-image:
        linear-gradient(rgba(245,158,11,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,158,11,0.045) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── Font utility classes ───────────────────────────── */
    .font-display { font-family: 'Bebas Neue', sans-serif; }
    .font-tac     { font-family: 'Rajdhani', sans-serif; }
    .font-data    { font-family: 'Share Tech Mono', monospace; }

    /* ── Entry animations ───────────────────────────────── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .anim-panel { animation: fadeSlideUp 0.25s ease forwards; }
    .anim-fade  { animation: fadeIn 0.2s ease forwards; }

    /* ── Interactive states ─────────────────────────────── */
    .tac-answer:hover:not(:disabled) {
      border-color: rgba(245,158,11,0.45) !important;
      background:   rgba(245,158,11,0.07) !important;
    }
    .tac-primary { transition: filter 0.15s, transform 0.1s; }
    .tac-primary:hover:not(:disabled) { filter: brightness(1.08); }
    .tac-primary:active:not(:disabled) { transform: scale(0.98); }
  </style>

  <!-- Tailwind CSS (Play CDN — fine for MVP, no build step) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Extend Tailwind with our navy primary
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: "#1a2744"
          }
        }
      }
    };
  </script>

  <!-- React 18 (development build for now — switch to .production.min.js before launch) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone — transpiles JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="text-slate-100">
  <div id="root"></div>

  <!-- Vehicle data — must load BEFORE app.jsx; exposes window.vehicles -->
  <script src="data/vehicles.js"></script>

  <!-- App entry point — Babel transpiles this on load -->
  <script type="text/babel" data-presets="react" src="app.jsx"></script>

  <!-- Service worker registration -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch((err) => {
          console.warn("Service worker registration failed:", err);
        });
      });
    }
  </script>
</body>
</html>
